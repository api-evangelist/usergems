name: UserGems
description: >-
  UserGems is a San Francisco-based sales intelligence platform that tracks champion job changes and surfaces buying
  signals so sales and marketing teams can prioritize outbound and ABM motions. The platform packages 30+ native signals
  (job changes, contact-level intent, M&A, hiring, web visits), Gem-E AI agents for prospect list building and email
  personalization, and custom AI scoring trained on 600+ closed-won patterns. UserGems exposes a public REST API at
  api.usergems.com/v1 that lets customers programmatically add and remove contacts to track for job changes, add and
  remove target accounts, and honor data-subject deletion requests. The API uses an X-Api-Key header for authentication
  and processes submissions asynchronously. Native integrations include Salesforce, HubSpot, Microsoft Dynamics,
  Outreach, Salesloft, Gong Engage, Marketo, LinkedIn Ads, Meta Ads, and Google Ads.
tags:
